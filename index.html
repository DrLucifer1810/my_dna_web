<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyDNA Global Network | Live Stats</title>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="glow-bg"></div>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="logo-group">
                <div class="logo-icon pulse"></div>
                <h1>MyDNA <span class="accent-text">Network</span></h1>
            </div>
            <div class="header-stats">
                <div class="stat-badge">
                    <span class="label">Total Nodes</span>
                    <span class="value accent-text" id="totalNodesCount">0</span>
                </div>
                <div class="stat-badge">
                    <span class="label">Last Sync</span>
                    <span class="value" id="lastSyncTime">--:--</span>
                </div>
            </div>
        </header>

        <main class="dashboard-grid">
            <!-- Sidebar: Top Skills -->
            <aside class="sidebar">
                <div class="panel">
                    <h2>Global Top Skills</h2>
                    <p class="subtitle">Most requested & possessed</p>
                    <div class="skills-ranking" id="skillsRankingContainer">
                        <!-- Injected via JS -->
                    </div>
                </div>
            </aside>

            <!-- Main Content: Leaderboard -->
            <section class="main-content">
                <!-- Filters -->
                <div class="filter-bar">
                    <input type="text" id="searchInput" placeholder="Search by public key or skill..." class="search-input">
                    <div class="filter-group">
                        <select id="intentFilter" class="filter-select">
                            <option value="all">All Intents</option>
                            <option value="Ứng viên">Candidates</option>
                            <option value="Nhà tuyển dụng">Employers</option>
                            <option value="Freelancer">Freelancers</option>
                        </select>
                        <select id="workModelFilter" class="filter-select">
                            <option value="all">All Models</option>
                            <option value="Remote">Remote</option>
                            <option value="Hybrid">Hybrid</option>
                            <option value="On-site">On-site</option>
                        </select>
                    </div>
                </div>

                <!-- List -->
                <div class="nodes-list" id="nodesListContainer">
                    <div class="loading-pulse">Loading Network Data...</div>
                </div>
            </section>
        </main>
    </div>

    <!-- Profile Detail Modal -->
    <div class="modal-overlay" id="profileModal">
        <div class="modal-content">
            <button class="close-btn" id="closeModalBtn">&times;</button>
            
            <div class="modal-header">
                <div class="modal-avatar" id="modalAvatar"></div>
                <div class="modal-title">
                    <h2 id="modalPublicKey">PublicKey</h2>
                    <span class="badge" id="modalIntent">Intent</span>
                </div>
            </div>

            <div class="modal-body">
                <div class="info-group">
                    <span class="info-label">Seniority</span>
                    <span class="info-value" id="modalSeniority">Unknown</span>
                </div>
                <div class="info-group">
                    <span class="info-label">Work Model</span>
                    <span class="info-value" id="modalWorkModel">Remote</span>
                </div>
                <div class="info-group">
                    <span class="info-label">Salary Expectation</span>
                    <span class="info-value accent-text" id="modalSalary">Negotiable</span>
                </div>
                
                <div class="skills-section">
                    <h3>Technical Stack</h3>
                    <div class="tags-container" id="modalSkills"></div>
                </div>

                <div class="skills-section">
                    <h3>Domain Knowledge</h3>
                    <div class="tags-container" id="modalDomain"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
