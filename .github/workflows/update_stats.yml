name: Update Global Stats

on:
  schedule:
    # Run every 2 hours
    - cron: '0 */2 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  fetch_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Build Static Stats Data (Sharding)
        env:
          WEBHOOK_URL: ${{ secrets.MYDNA_GLOBAL_STATS_WEBHOOK }}
        run: |
          if [ -z "$WEBHOOK_URL" ]; then
            echo "Error: MYDNA_GLOBAL_STATS_WEBHOOK secret is not set."
            exit 1
          fi
          echo "Building shards..."
          node scripts/build_stats.js
          echo "Build finished successfully."

      - name: Commit and Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add public/
          
          # Only commit if there are changes
          if git diff --staged --quiet; then
            echo "No new data to commit."
          else
            git commit -m "chore: auto-update global_stats.json [skip ci]"
            git push
          fi
